<!DOCTYPE html>
<html lang="en">
<head>

    <title>About</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="top-row">
            <h1 class="logo-text">DM</h1>
            <div class="top-row-right-section">

                <div class="mobile-menu">
                    <button onclick="toggleDropdown()" id="menu-button">☰</button>
                    <div id="dropdown-nav" class="dropdown-content">
                        <button onclick="toggleDropdown()" id="close-button">×</button>

    <script>
        function toggleDropdown() {
            document.body.classList.toggle('dropdown-open');
        }
            window.addEventListener('pageshow', () => {

        });
    </script>
